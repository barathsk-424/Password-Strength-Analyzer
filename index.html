<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard - Premium Password Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <main class="container">
        <header>
            <h1>Password Guard</h1>
            <p class="subtitle">Secure your digital identity</p>
        </header>

        <section class="input-group">
            <input 
                type="password" 
                id="password" 
                placeholder="Enter your security phrase" 
                autocomplete="off"
            >
            <button type="button" class="toggle-password" id="toggleBtn" onclick="togglePassword()">
                SHOW
            </button>
        </section>

        <section class="analysis">
            <div class="strength-text">
                <span class="strength-label">Strength Level</span>
                <span id="strength-status">---</span>
            </div>
            
            <div class="strength-meter">
                <div id="strength-bar" class="strength-bar"></div>
            </div>

            <ul class="checklist">
                <li class="checklist-item" id="req-length">
                    <span class="icon"></span> 8+ Characters
                </li>
                <li class="checklist-item" id="req-upper">
                    <span class="icon"></span> Uppercase Letter
                </li>
                <li class="checklist-item" id="req-number">
                    <span class="icon"></span> Number (0-9)
                </li>
                <li class="checklist-item" id="req-symbol">
                    <span class="icon"></span> Special Symbol
                </li>
            </ul>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
